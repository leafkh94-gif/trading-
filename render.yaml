services:
  - type: web
    name: trading-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python gold_agent.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CAPITAL_API_KEY
        sync: false
      - key: CAPITAL_PASSWORD
        sync: false
      - key: CAPITAL_EMAIL
        sync: false
